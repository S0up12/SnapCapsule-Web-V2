name: snapcapsule-web

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snapcapsule}
      POSTGRES_USER: ${POSTGRES_USER:-snapcapsule}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snapcapsule}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snapcapsule} -d ${POSTGRES_DB:-snapcapsule}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [
      "uvicorn",
      "apps.api.app.main:app",
      "--host",
      "0.0.0.0",
      "--port",
      "8000",
      "--reload"
    ]
    environment:
      SNAPCAPSULE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-snapcapsule}:${POSTGRES_PASSWORD:-snapcapsule}@db:5432/${POSTGRES_DB:-snapcapsule}
      SNAPCAPSULE_REDIS_URL: redis://redis:6379/0
      SNAPCAPSULE_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SNAPCAPSULE_RAW_MEDIA_DIR: /srv/snapcapsule/raw
      SNAPCAPSULE_THUMBNAIL_DIR: /srv/snapcapsule/thumbnails
      SNAPCAPSULE_LIBRARY_ARCHIVES_DIR: /srv/snapcapsule/library
      SNAPCAPSULE_INGEST_CACHE_DIR: /srv/snapcapsule/cache
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - ${API_PORT:-8000}:8000
    restart: unless-stopped
    volumes:
      - .:/workspace
      - raw_media:/srv/snapcapsule/raw
      - thumbnails:/srv/snapcapsule/thumbnails
      - library_archives:/srv/snapcapsule/library
      - ingest_cache:/srv/snapcapsule/cache

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "celery -A apps.worker.app.worker:celery_app worker --loglevel=INFO --concurrency=${WORKER_CONCURRENCY:-2} --queues=ingest,media"
      ]
    environment:
      SNAPCAPSULE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-snapcapsule}:${POSTGRES_PASSWORD:-snapcapsule}@db:5432/${POSTGRES_DB:-snapcapsule}
      SNAPCAPSULE_REDIS_URL: redis://redis:6379/0
      SNAPCAPSULE_RAW_MEDIA_DIR: /srv/snapcapsule/raw
      SNAPCAPSULE_THUMBNAIL_DIR: /srv/snapcapsule/thumbnails
      SNAPCAPSULE_LIBRARY_ARCHIVES_DIR: /srv/snapcapsule/library
      SNAPCAPSULE_INGEST_CACHE_DIR: /srv/snapcapsule/cache
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    restart: unless-stopped
    volumes:
      - .:/workspace
      - raw_media:/srv/snapcapsule/raw
      - thumbnails:/srv/snapcapsule/thumbnails
      - library_archives:/srv/snapcapsule/library
      - ingest_cache:/srv/snapcapsule/cache

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      backend:
        condition: service_started
    command: ["npm", "run", "dev"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - ${WEB_PORT:-3000}:5173
    restart: unless-stopped
    volumes:
      - ./apps/web:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  redis_data:
  raw_media:
  thumbnails:
  library_archives:
  ingest_cache:
  frontend_node_modules:
