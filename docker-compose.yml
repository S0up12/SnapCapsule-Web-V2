name: snapcapsule-web

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snapcapsule}
      POSTGRES_USER: ${POSTGRES_USER:-snapcapsule}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snapcapsule}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snapcapsule} -d ${POSTGRES_DB:-snapcapsule}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ${HOST_POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [
      "uvicorn",
      "apps.api.app.main:app",
      "--host",
      "0.0.0.0",
      "--port",
      "8000",
      "--reload"
    ]
    environment:
      SNAPCAPSULE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-snapcapsule}:${POSTGRES_PASSWORD:-snapcapsule}@db:5432/${POSTGRES_DB:-snapcapsule}
      SNAPCAPSULE_REDIS_URL: redis://redis:6379/0
      SNAPCAPSULE_ALLOWED_ORIGINS: ${SNAPCAPSULE_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SNAPCAPSULE_RAW_MEDIA_DIR: /srv/snapcapsule/raw
      SNAPCAPSULE_THUMBNAIL_DIR: /srv/snapcapsule/thumbnails
      SNAPCAPSULE_INGEST_ROOT_DIR: /srv/snapcapsule/ingest
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - ${SNAPCAPSULE_API_PORT:-8000}:8000
    restart: unless-stopped
    volumes:
      - .:/workspace
      - ${HOST_RAW_MEDIA_DIR:-./data/raw}:/srv/snapcapsule/raw
      - ${HOST_THUMBNAIL_DIR:-./data/thumbnails}:/srv/snapcapsule/thumbnails
      - ${HOST_INGEST_DIR:-./data/ingest}:/srv/snapcapsule/ingest

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "celery -A apps.worker.app.worker:celery_app worker --loglevel=INFO --concurrency=${WORKER_CONCURRENCY:-2} --queues=ingest,media"
      ]
    environment:
      SNAPCAPSULE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-snapcapsule}:${POSTGRES_PASSWORD:-snapcapsule}@db:5432/${POSTGRES_DB:-snapcapsule}
      SNAPCAPSULE_REDIS_URL: redis://redis:6379/0
      SNAPCAPSULE_RAW_MEDIA_DIR: /srv/snapcapsule/raw
      SNAPCAPSULE_THUMBNAIL_DIR: /srv/snapcapsule/thumbnails
      SNAPCAPSULE_INGEST_ROOT_DIR: /srv/snapcapsule/ingest
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    restart: unless-stopped
    volumes:
      - .:/workspace
      - ${HOST_RAW_MEDIA_DIR:-./data/raw}:/srv/snapcapsule/raw
      - ${HOST_THUMBNAIL_DIR:-./data/thumbnails}:/srv/snapcapsule/thumbnails
      - ${HOST_INGEST_DIR:-./data/ingest}:/srv/snapcapsule/ingest

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      backend:
        condition: service_started
    command: ["npm", "run", "dev"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - ${SNAPCAPSULE_WEB_PORT:-3000}:5173
    restart: unless-stopped
    volumes:
      - ./apps/web:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
